<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>猪猪的吃喝指南</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: linear-gradient(160deg, #fef6e8 0%, #fde8c8 40%, #f9d4a0 100%);
      color: #4a3728;
      padding: 20px;
    }
    body::before {
      content: '';
      position: fixed; top: -60%; right: -30%;
      width: 80vw; height: 80vw;
      background: radial-gradient(circle, rgba(243,156,18,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .container {
      width: 100%;
      max-width: 620px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 32px 26px;
      box-shadow:
        0 12px 40px rgba(180,120,60,0.12),
        0 2px 8px rgba(0,0,0,0.04),
        inset 0 1px 0 rgba(255,255,255,0.8);
      margin: 10px 0;
    }
    h1 {
      text-align: center;
      font-size: 24px;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #e67e22, #d35400);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #b8956a;
      margin-bottom: 22px;
      letter-spacing: 2px;
    }
    /* Tab 导航 */
    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .tab-btn {
      padding: 8px 14px;
      border: 2px solid transparent;
      border-radius: 20px;
      background: #f5ebe0;
      color: #9a7d5a;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, #f39c12, #e67e22);
      color: #fff;
      box-shadow: 0 3px 12px rgba(230,126,34,0.35);
      transform: translateY(-1px);
    }
    .tab-btn:hover:not(.active) {
      background: #efe0cc;
      color: #e67e22;
    }
    .tab-panel { display: none; animation: fadeIn 0.35s ease; }
    .tab-panel.active { display: block; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* 通用表单样式 */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; margin-bottom: 6px;
      font-weight: 600; font-size: 14px; color: #6d4c2a;
    }
    .form-input, .form-select {
      width: 100%; padding: 11px 14px;
      border: 2px solid #ede0d0; border-radius: 12px;
      font-size: 15px; background: #fefbf7; color: #4a3728;
      transition: border-color 0.2s, box-shadow 0.2s; outline: none;
    }
    .form-input:focus, .form-select:focus {
      border-color: #e67e22;
      box-shadow: 0 0 0 3px rgba(230,126,34,0.1);
    }
    .form-input::placeholder { color: #c4a882; }
    .btn {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, #f5a623, #e67e22);
      color: #fff; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(230,126,34,0.3);
      letter-spacing: 0.5px;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(230,126,34,0.35); }
    .btn:active { transform: translateY(0); box-shadow: 0 2px 8px rgba(230,126,34,0.25); }
    .btn-sm { width: auto; padding: 8px 16px; font-size: 13px; border-radius: 10px; }
    .btn-danger {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      box-shadow: 0 3px 10px rgba(231,76,60,0.25);
    }
    .result-box {
      margin-top: 16px; padding: 18px;
      background: linear-gradient(135deg, #fefaf5, #fdf0e0);
      border-radius: 14px; border: 1px solid #f0dcc8;
      line-height: 1.9; font-size: 15px;
      text-align: center;
    }
    .result-box strong { color: #d35400; }
    .note-box {
      font-size: 13px; color: #9a7d5a; margin-top: 16px;
      line-height: 1.7; padding: 12px 14px;
      background: rgba(230,126,34,0.05); border-radius: 12px;
      border-left: 3px solid #f5a623;
    }
    /* 食物表格 */
    .food-table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 12px; font-size: 13px; }
    .food-table th {
      background: linear-gradient(135deg, #f5a623, #e67e22);
      color: #fff; padding: 10px 8px;
      text-align: left; font-weight: 600;
      position: sticky; top: 0; cursor: pointer;
      user-select: none; white-space: nowrap;
    }
    .food-table th:first-child { border-radius: 10px 0 0 0; }
    .food-table th:last-child { border-radius: 0 10px 0 0; }
    .food-table th .sort-icon { font-size: 11px; margin-left: 2px; opacity: 0.7; }
    .food-table td { padding: 8px 8px; border-bottom: 1px solid #f5ebe0; }
    .food-table tr:nth-child(even) { background: rgba(243,156,18,0.04); }
    .food-table tr:hover { background: rgba(243,156,18,0.1); }
    .food-table tr:last-child td:first-child { border-radius: 0 0 0 10px; }
    .food-table tr:last-child td:last-child { border-radius: 0 0 10px 0; }
    .vc-high { color: #27ae60; font-weight: 600; }
    .vc-mid { color: #e67e22; font-weight: 600; }
    .vc-low { color: #b0a090; }
    /* VC 进度条 */
    .vc-bar-wrap {
      display: flex; align-items: center; gap: 6px;
    }
    .vc-bar {
      height: 6px; border-radius: 3px;
      background: linear-gradient(90deg, #f5a623, #e67e22);
      transition: width 0.4s ease;
    }
    .vc-bar-bg {
      width: 60px; height: 6px; border-radius: 3px;
      background: #f0e6d8;
    }
    /* 体重图表 */
    .chart-area {
      width: 100%; height: 200px; margin-top: 16px;
      background: #fefbf7; border-radius: 14px;
      border: 1px solid #f0dcc8; position: relative; overflow: hidden;
    }
    .chart-canvas { width: 100%; height: 100%; }
    .weight-list { margin-top: 12px; max-height: 180px; overflow-y: auto; }
    .weight-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 12px; border-bottom: 1px solid #f5ebe0; font-size: 14px;
    }
    .weight-item:hover { background: rgba(243,156,18,0.05); }
    .weight-item .date { color: #9a7d5a; }
    .weight-item .value { font-weight: 600; color: #d35400; }
    .weight-item .delete-btn {
      background: none; border: none; color: #d4c4b0; cursor: pointer;
      font-size: 16px; padding: 2px 6px; border-radius: 6px;
      transition: all 0.15s;
    }
    .weight-item .delete-btn:hover { color: #e74c3c; background: rgba(231,76,60,0.08); }
    /* 健康评估 */
    .health-card {
      padding: 16px; border-radius: 14px; margin-top: 12px;
      border: 1px solid #f0dcc8;
    }
    .health-card h3 { font-size: 15px; margin-bottom: 8px; color: #e67e22; }
    .health-card p { font-size: 14px; line-height: 1.7; color: #6d4c2a; }
    .health-good { background: linear-gradient(135deg, #f0fff4, #e6f7e6); border-color: #a3d9a5; }
    .health-warn { background: linear-gradient(135deg, #fffcf0, #fff3d6); border-color: #f5c842; }
    .health-alert { background: linear-gradient(135deg, #fff5f5, #ffe8e8); border-color: #e88; }
    .tag {
      display: inline-block; padding: 3px 10px; border-radius: 8px;
      font-size: 12px; font-weight: 600; margin-right: 4px;
    }
    .tag-green { background: #e6f7e6; color: #27ae60; }
    .tag-orange { background: #fff3d6; color: #e67e22; }
    .tag-red { background: #ffe8e8; color: #e74c3c; }
    .flex-row { display: flex; gap: 8px; align-items: flex-end; }
    .flex-row .form-group { flex: 1; margin-bottom: 0; }
    /* 滚动条美化 */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #e0d0c0; border-radius: 2px; }
  </style>
</head>
<body>
<div class="container">
  <h1>🐹 猪猪的吃喝指南</h1>
  <p class="subtitle">— 荷兰猪健康饮食小助手 —</p>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('calc')">💊 VC 计算</button>
    <button class="tab-btn" onclick="switchTab('food')">🥬 食物参考</button>
    <button class="tab-btn" onclick="switchTab('feed')">🍽 喂食计算</button>
    <button class="tab-btn" onclick="switchTab('weight')">📊 体重追踪</button>
    <button class="tab-btn" onclick="switchTab('health')">❤ 健康评估</button>
  </div>

  <!-- VC 计算器 -->
  <div id="panel-calc" class="tab-panel active">
    <div class="form-group">
      <label class="form-label" for="vc-weight">荷兰猪体重（克）</label>
      <input class="form-input" type="number" id="vc-weight" placeholder="例如：1000" min="100" max="2000">
    </div>
    <button class="btn" onclick="calcVC()">计算每日 VC 需求</button>
    <div id="vc-result" class="result-box" style="display:none"></div>
    <p class="note-box">💡 日常维持 10mg/kg，应激/生病/老年 30mg/kg &nbsp;&nbsp;&nbsp;&nbsp;VC 片常见规格：50mg/片，可掰碎使用</p>
  </div>

  <!-- 食物参考表 -->
  <div id="panel-food" class="tab-panel">
    <p class="form-label">常见蔬果 VC 含量（每 100g） <span style="font-weight:normal;font-size:12px;color:#b8956a">点击表头排序</span></p>
    <table class="food-table">
      <thead>
        <tr>
          <th onclick="sortFoodTable('name')">食物 <span class="sort-icon" id="sort-name"></span></th>
          <th onclick="sortFoodTable('vc')">VC (mg) <span class="sort-icon" id="sort-vc">▼</span></th>
          <th>等级</th>
          <th>备注</th>
        </tr>
      </thead>
      <tbody id="food-table-body"></tbody>
    </table>
    <p class="note-box">💡 数据为近似值，实际含量因品种和新鲜度有差异。建议每天提供 2-3 种不同蔬果搭配。</p>
  </div>

  <!-- 喂食量计算器 -->
  <div id="panel-feed" class="tab-panel">
    <div class="form-group">
      <label class="form-label" for="feed-weight">荷兰猪体重（克）</label>
      <input class="form-input" type="number" id="feed-weight" placeholder="例如：1000" min="100" max="2000">
    </div>
    <div class="form-group">
      <label class="form-label" for="feed-food">选择食物</label>
      <select class="form-select" id="feed-food"></select>
    </div>
    <div class="form-group">
      <label class="form-label" for="feed-level">补充强度</label>
      <select class="form-select" id="feed-level">
        <option value="10">日常维持（10mg/kg）</option>
        <option value="20">轻度补充（20mg/kg）</option>
        <option value="30">应激/康复（30mg/kg）</option>
      </select>
    </div>
    <button class="btn" onclick="calcFeed()">计算喂食量</button>
    <div id="feed-result" class="result-box" style="display:none"></div>
  </div>

  <!-- 体重追踪 -->
  <div id="panel-weight" class="tab-panel">
    <div class="flex-row">
      <div class="form-group">
        <label class="form-label" for="w-date">日期</label>
        <input class="form-input" type="date" id="w-date">
      </div>
      <div class="form-group">
        <label class="form-label" for="w-value">体重（克）</label>
        <input class="form-input" type="number" id="w-value" placeholder="克" min="100" max="2000">
      </div>
      <button class="btn btn-sm" onclick="addWeight()" style="margin-bottom:0;height:42px">记录</button>
    </div>
    <div class="chart-area">
      <canvas id="weight-chart" class="chart-canvas"></canvas>
    </div>
    <div class="weight-list" id="weight-list"></div>
    <div style="margin-top:10px;text-align:right">
      <button class="btn btn-sm btn-danger" onclick="clearWeights()">清空记录</button>
    </div>
  </div>

  <!-- 健康评估 -->
  <div id="panel-health" class="tab-panel">
    <div class="form-group">
      <label class="form-label" for="h-weight">体重（克）</label>
      <input class="form-input" type="number" id="h-weight" placeholder="例如：1000" min="100" max="2000">
    </div>
    <div class="form-group">
      <label class="form-label" for="h-age">年龄</label>
      <select class="form-select" id="h-age">
        <option value="baby">幼年（&lt; 6 个月）</option>
        <option value="young">青年（6-12 个月）</option>
        <option value="adult" selected>成年（1-4 岁）</option>
        <option value="senior">老年（&gt; 4 岁）</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">特殊状态（可多选）</label>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px">
        <label style="font-weight:normal;font-size:14px;display:flex;align-items:center;gap:4px">
          <input type="checkbox" id="h-pregnant"> 怀孕/哺乳
        </label>
        <label style="font-weight:normal;font-size:14px;display:flex;align-items:center;gap:4px">
          <input type="checkbox" id="h-sick"> 生病中
        </label>
        <label style="font-weight:normal;font-size:14px;display:flex;align-items:center;gap:4px">
          <input type="checkbox" id="h-stress"> 应激状态
        </label>
      </div>
    </div>
    <button class="btn" onclick="assessHealth()">评估健康状态</button>
    <div id="health-result"></div>
  </div>

</div>

<script>
// ========== 食物数据 ==========
const FOODS = [
  { name: '红甜椒', vc: 190, level: 'high', note: '首选补 VC 食物' },
  { name: '黄甜椒', vc: 180, level: 'high', note: '同样优秀' },
  { name: '绿甜椒', vc: 80, level: 'mid', note: '比红黄椒低一些' },
  { name: '西兰花', vc: 89, level: 'mid', note: '适量喂，易胀气' },
  { name: '羽衣甘蓝', vc: 120, level: 'high', note: '钙含量也高' },
  { name: '芹菜', vc: 12, level: 'low', note: '水分多，VC 少' },
  { name: '番茄', vc: 14, level: 'low', note: '少量喂，偏酸' },
  { name: '草莓', vc: 59, level: 'mid', note: '当零食，糖分高' },
  { name: '橙子', vc: 53, level: 'mid', note: '少量喂，偏酸' },
  { name: '猕猴桃', vc: 93, level: 'mid', note: '偶尔喂，糖分高' },
  { name: '菠菜', vc: 28, level: 'low', note: '草酸高，少喂' },
  { name: '生菜（罗马）', vc: 24, level: 'low', note: '水分多，营养一般' },
  { name: '胡萝卜', vc: 6, level: 'low', note: 'VC 极少，当零食' },
  { name: '黄瓜', vc: 3, level: 'low', note: '几乎无 VC，补水用' },
  { name: '欧芹', vc: 133, level: 'high', note: '钙高，适量喂' }
];

// ========== Tab 切换 ==========
function switchTab(name) {
  const btns = document.querySelectorAll('.tab-btn');
  const panels = document.querySelectorAll('.tab-panel');
  for (let i = 0; i < btns.length; i++) { btns[i].classList.remove('active'); }
  for (let i = 0; i < panels.length; i++) { panels[i].classList.remove('active'); }
  const targetPanel = document.getElementById('panel-' + name);
  if (targetPanel) { targetPanel.classList.add('active'); }
  const tabMap = { calc: 0, food: 1, feed: 2, weight: 3, health: 4 };
  if (tabMap[name] !== undefined && btns[tabMap[name]]) {
    btns[tabMap[name]].classList.add('active');
  }
  if (name === 'weight') { renderWeightChart(); }
}

// ========== VC 计算器 ==========
function calcVC() {
  const weight = parseFloat(document.getElementById('vc-weight').value);
  const el = document.getElementById('vc-result');
  if (!weight || weight < 100) { alert('请输入有效体重（100-2000 克）'); return; }
  const kg = weight / 1000;
  const low = (kg * 10).toFixed(1);
  const high = (kg * 30).toFixed(1);
  el.innerHTML = '<strong>体重：' + weight + ' 克</strong><br>' +
    '日常维持：' + low + ' mg VC<br>' +
    '应激/康复期：' + high + ' mg VC';
  el.style.display = 'block';
}

// ========== 食物参考表渲染 ==========
// 当前排序状态
let foodSortKey = 'vc';
let foodSortAsc = false; // 默认降序

// 排序食物表格
function sortFoodTable(key) {
  if (foodSortKey === key) {
    foodSortAsc = !foodSortAsc;
  } else {
    foodSortKey = key;
    foodSortAsc = key === 'name'; // 名字默认升序，VC 默认降序
  }
  renderFoodTable();
}

function renderFoodTable() {
  const tbody = document.getElementById('food-table-body');
  // 复制并排序
  const sorted = FOODS.slice().sort(function(a, b) {
    let cmp = 0;
    if (foodSortKey === 'vc') {
      cmp = a.vc - b.vc;
    } else {
      cmp = a.name.localeCompare(b.name, 'zh');
    }
    return foodSortAsc ? cmp : -cmp;
  });
  const maxVc = 200;
  let html = '';
  const levelMap = { high: '高', mid: '中', low: '低' };
  const classMap = { high: 'vc-high', mid: 'vc-mid', low: 'vc-low' };
  for (let i = 0; i < sorted.length; i++) {
    const f = sorted[i];
    const barWidth = Math.round(f.vc / maxVc * 60);
    html += '<tr><td>' + f.name + '</td>' +
      '<td><div class="vc-bar-wrap"><strong>' + f.vc + '</strong>' +
      '<div class="vc-bar-bg"><div class="vc-bar" style="width:' + barWidth + 'px"></div></div>' +
      '</div></td>' +
      '<td><span class="' + classMap[f.level] + '">' + levelMap[f.level] + '</span></td>' +
      '<td>' + f.note + '</td></tr>';
  }
  tbody.innerHTML = html;
  // 更新排序图标
  const nameIcon = document.getElementById('sort-name');
  const vcIcon = document.getElementById('sort-vc');
  if (nameIcon) { nameIcon.textContent = foodSortKey === 'name' ? (foodSortAsc ? '▲' : '▼') : ''; }
  if (vcIcon) { vcIcon.textContent = foodSortKey === 'vc' ? (foodSortAsc ? '▲' : '▼') : ''; }
}

// ========== 喂食量计算器 ==========
function initFeedSelect() {
  const sel = document.getElementById('feed-food');
  let html = '';
  for (let i = 0; i < FOODS.length; i++) {
    html += '<option value="' + i + '">' + FOODS[i].name + '（' + FOODS[i].vc + 'mg/100g）</option>';
  }
  sel.innerHTML = html;
}

function calcFeed() {
  const weight = parseFloat(document.getElementById('feed-weight').value);
  const foodIdx = parseInt(document.getElementById('feed-food').value);
  const level = parseInt(document.getElementById('feed-level').value);
  const el = document.getElementById('feed-result');
  if (!weight || weight < 100) { alert('请输入有效体重（100-2000 克）'); return; }
  const food = FOODS[foodIdx];
  const kg = weight / 1000;
  const needMg = kg * level;
  // 需要多少克该食物
  const needGram = (needMg / food.vc * 100).toFixed(1);
  el.innerHTML = '<strong>' + food.name + '</strong><br>' +
    '每日 VC 需求：' + needMg.toFixed(1) + ' mg<br>' +
    '需要喂食：<strong>' + needGram + ' 克</strong> ' + food.name + '<br>' +
    '<span style="font-size:13px;color:#9a7d5a">（约 ' + (needGram / 10).toFixed(1) + ' 个拇指大小的块）</span>';
  el.style.display = 'block';
}

// ========== 体重追踪 ==========
function getWeights() {
  try {
    const data = localStorage.getItem('gp_weights');
    return data ? JSON.parse(data) : [];
  } catch (e) { return []; }
}

function saveWeights(list) {
  localStorage.setItem('gp_weights', JSON.stringify(list));
}

function addWeight() {
  const dateEl = document.getElementById('w-date');
  const valEl = document.getElementById('w-value');
  const date = dateEl.value;
  const value = parseFloat(valEl.value);
  if (!date || !value || value < 100) {
    alert('请填写日期和有效体重');
    return;
  }
  const list = getWeights();
  list.push({ date: date, value: value });
  // 按日期排序
  list.sort(function(a, b) { return a.date.localeCompare(b.date); });
  saveWeights(list);
  valEl.value = '';
  renderWeightList();
  renderWeightChart();
}

function deleteWeight(idx) {
  const list = getWeights();
  list.splice(idx, 1);
  saveWeights(list);
  renderWeightList();
  renderWeightChart();
}

function clearWeights() {
  if (!confirm('确定清空所有体重记录？')) return;
  localStorage.removeItem('gp_weights');
  renderWeightList();
  renderWeightChart();
}

function renderWeightList() {
  const list = getWeights();
  const el = document.getElementById('weight-list');
  if (list.length === 0) {
    el.innerHTML = '<div style="text-align:center;color:#ccc;padding:20px">暂无记录</div>';
    return;
  }
  let html = '';
  for (let i = list.length - 1; i >= 0; i--) {
    html += '<div class="weight-item">' +
      '<span class="date">' + list[i].date + '</span>' +
      '<span class="value">' + list[i].value + ' g</span>' +
      '<button class="delete-btn" onclick="deleteWeight(' + i + ')">×</button>' +
      '</div>';
  }
  el.innerHTML = html;
}

// 简易 Canvas 折线图
function renderWeightChart() {
  const canvas = document.getElementById('weight-chart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * 2;
  canvas.height = rect.height * 2;
  ctx.scale(2, 2);
  const w = rect.width;
  const h = rect.height;
  // 清空
  ctx.clearRect(0, 0, w, h);
  const list = getWeights();
  if (list.length < 2) {
    ctx.fillStyle = '#ccc';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('至少需要 2 条记录才能显示图表', w / 2, h / 2);
    return;
  }
  const pad = { top: 20, right: 20, bottom: 35, left: 50 };
  const cw = w - pad.left - pad.right;
  const ch = h - pad.top - pad.bottom;
  const values = list.map(function(item) { return item.value; });
  const minV = Math.min.apply(null, values) - 50;
  const maxV = Math.max.apply(null, values) + 50;
  const range = maxV - minV || 1;

  // 网格线
  ctx.strokeStyle = '#f0dcc8';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + ch - (ch * i / 4);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cw, y); ctx.stroke();
    ctx.fillStyle = '#9a7d5a';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(minV + range * i / 4) + 'g', pad.left - 6, y + 4);
  }

  // 折线
  ctx.strokeStyle = '#e67e22';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  for (let i = 0; i < list.length; i++) {
    const x = pad.left + (cw * i / (list.length - 1));
    const y = pad.top + ch - (ch * (list[i].value - minV) / range);
    if (i === 0) { ctx.moveTo(x, y); } else { ctx.lineTo(x, y); }
  }
  ctx.stroke();

  // 数据点
  for (let i = 0; i < list.length; i++) {
    const x = pad.left + (cw * i / (list.length - 1));
    const y = pad.top + ch - (ch * (list[i].value - minV) / range);
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#e67e22'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.stroke();
  }

  // X 轴日期标签（最多显示 6 个）
  ctx.fillStyle = '#9a7d5a';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  const step = Math.max(1, Math.floor(list.length / 6));
  for (let i = 0; i < list.length; i += step) {
    const x = pad.left + (cw * i / (list.length - 1));
    const label = list[i].date.substring(5); // MM-DD
    ctx.fillText(label, x, h - pad.bottom + 16);
  }
}

// ========== 健康评估 ==========
function assessHealth() {
  const weight = parseFloat(document.getElementById('h-weight').value);
  const age = document.getElementById('h-age').value;
  const pregnant = document.getElementById('h-pregnant').checked;
  const sick = document.getElementById('h-sick').checked;
  const stress = document.getElementById('h-stress').checked;
  const el = document.getElementById('health-result');

  if (!weight || weight < 100) { alert('请输入有效体重（100-2000 克）'); return; }

  let cards = [];
  // 体重评估
  const weightRanges = {
    baby: { min: 100, max: 400, label: '幼年' },
    young: { min: 300, max: 700, label: '青年' },
    adult: { min: 700, max: 1200, label: '成年' },
    senior: { min: 600, max: 1100, label: '老年' }
  };
  const wr = weightRanges[age];
  let weightStatus, weightClass;
  if (weight < wr.min) {
    weightStatus = '偏轻';
    weightClass = 'health-alert';
  } else if (weight > wr.max) {
    weightStatus = '偏重';
    weightClass = 'health-warn';
  } else {
    weightStatus = '正常';
    weightClass = 'health-good';
  }
  const tagClass = weightStatus === '正常' ? 'tag-green' : (weightStatus === '偏轻' ? 'tag-red' : 'tag-orange');
  cards.push('<div class="health-card ' + weightClass + '">' +
    '<h3>体重评估 <span class="tag ' + tagClass + '">' + weightStatus + '</span></h3>' +
    '<p>' + wr.label + '荷兰猪正常体重范围：' + wr.min + '-' + wr.max + ' 克<br>' +
    '当前体重：<strong>' + weight + ' 克</strong>' +
    (weightStatus === '偏轻' ? '<br>⚠️ 建议增加喂食量，观察食欲和精神状态' : '') +
    (weightStatus === '偏重' ? '<br>⚠️ 建议适当控制零食，增加活动空间' : '') +
    '</p></div>');

  // VC 需求评估
  const kg = weight / 1000;
  let vcLevel = 10; // 基础
  let vcReasons = [];
  if (age === 'baby' || age === 'young') { vcLevel = 20; vcReasons.push('幼年/青年期需要更多 VC'); }
  if (age === 'senior') { vcLevel = 20; vcReasons.push('老年期吸收能力下降'); }
  if (pregnant) { vcLevel = 30; vcReasons.push('怀孕/哺乳期需求增加'); }
  if (sick) { vcLevel = 30; vcReasons.push('生病期间消耗增大'); }
  if (stress) { vcLevel = Math.max(vcLevel, 25); vcReasons.push('应激状态需额外补充'); }
  const vcNeed = (kg * vcLevel).toFixed(1);
  const vcClass = vcLevel >= 30 ? 'health-warn' : (vcLevel >= 20 ? 'health-warn' : 'health-good');
  cards.push('<div class="health-card ' + vcClass + '">' +
    '<h3>VC 补充建议</h3>' +
    '<p>建议每日补充：<strong>' + vcNeed + ' mg</strong>（' + vcLevel + 'mg/kg）<br>' +
    (vcReasons.length > 0 ? '原因：' + vcReasons.join('、') : '当前状态良好，日常维持即可') +
    '</p></div>');

  // 喂养建议
  let tips = [];
  if (age === 'baby') {
    tips.push('幼年期需要充足的苜蓿草（高钙）');
    tips.push('逐步引入新鲜蔬菜，每次只加一种');
  } else {
    tips.push('以提摩西草为主食，无限量供应');
  }
  if (pregnant) { tips.push('怀孕期增加苜蓿草比例，补充钙质'); }
  if (sick) { tips.push('生病期间保证饮水，必要时用针管喂水'); }
  if (age === 'senior') { tips.push('老年猪牙齿可能有问题，注意观察进食情况'); }
  tips.push('每天提供新鲜蔬菜，优先选择高 VC 食物（甜椒、羽衣甘蓝）');
  tips.push('保持干净饮水，每天更换');

  cards.push('<div class="health-card health-good">' +
    '<h3>喂养建议</h3>' +
    '<p>' + tips.join('<br>') + '</p></div>');

  el.innerHTML = cards.join('');
}
